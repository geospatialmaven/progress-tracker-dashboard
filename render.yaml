services:
  - type: web
    name: geospatial-maven-dashboard
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: gm-db
          property: connectionString

databases:
  - name: gm-db
    plan: free
    region: oregon
